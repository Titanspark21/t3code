name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Format, Lint, Typecheck, Test, Browser Test, Build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      # The default Electron binary source (GitHub releases) was returning a
      # partial/empty archive on the runner, leaving node_modules/electron
      # without a usable binary and failing every apps/desktop test. Pull the
      # prebuilt binary from a mirror instead.
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Cache Electron binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # apps/desktop tests need Electron's prebuilt binary, which its
      # postinstall downloads. On CI that binary ends up missing (every desktop
      # test fails with "Electron failed to install correctly"). Diagnose the
      # state, then force a clean download (unset any skip flag, clear the
      # install marker) with retries, surfacing the real installer output.
      - name: Ensure Electron binary is installed
        working-directory: apps/desktop
        run: |
          install_js="$(node -e "console.log(require.resolve('electron/install.js'))")"
          electron_dir="$(dirname "$install_js")"
          echo "ELECTRON_SKIP_BINARY_DOWNLOAD=${ELECTRON_SKIP_BINARY_DOWNLOAD:-<unset>}"
          echo "electron dir: $electron_dir"
          ls -la "$electron_dir" | head
          echo "dist:"; ls -la "$electron_dir/dist" 2>&1 | head
          echo "@electron/get resolvable: $(node -e "try{console.log(require.resolve('@electron/get',{paths:['$electron_dir']}))}catch(e){console.log('NO -',e.code)}")"
          for attempt in 1 2 3 4 5; do
            if node -e "require('electron')" >/dev/null 2>&1; then
              echo "Electron binary present."
              exit 0
            fi
            echo "::warning::Electron binary missing (attempt $attempt/5); forcing download…"
            rm -f "$electron_dir/path.txt"
            rm -rf "$electron_dir/dist"
            ( cd "$electron_dir" && unset ELECTRON_SKIP_BINARY_DOWNLOAD && force_no_cache=true node ./install.js ) || echo "install.js exited $?"
            sleep $((attempt * 10))
          done
          echo "::error::Electron binary failed to install after 5 attempts."
          node -e "require('electron')"

      - name: Format
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Install browser test runtime
        run: |
          cd apps/web
          bunx playwright install --with-deps chromium

      - name: Browser test
        run: bun run --cwd apps/web test:browser

      - name: Build desktop pipeline
        run: bun run build:desktop

      - name: Verify preload bundle output
        run: |
          test -f apps/desktop/dist-electron/preload.cjs
          grep -nE "desktopBridge|getLocalEnvironmentBootstrap|PICK_FOLDER_CHANNEL|wsUrl" apps/desktop/dist-electron/preload.cjs

  release_smoke:
    name: Release Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Cache Bun and Turbo
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-${{ hashFiles('turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Exercise release-only workflow steps
        run: bun run scripts/release-smoke.ts
